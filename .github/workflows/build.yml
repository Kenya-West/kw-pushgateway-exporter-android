name: Build APKs

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.10.2"

      - name: Build debug APKs
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APKs (unsigned)
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="v$VERSION-$SHORT_SHA"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rename APKs
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
          APP_ID: pushgateway-exporter
        run: |
          mkdir -p release-assets
          for apk in app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk; do
            [ -e "$apk" ] || continue
            name=$(basename "$apk")
            abi=$(echo "$name" | sed -E 's/^app-(.+)-(debug|release)\.apk$/\1/')
            variant=$(echo "$name" | sed -E 's/^app-.+-(debug|release)\.apk$/\1/')
            [ "$variant" = "release" ] && variant="release-unsigned"
            cp "$apk" "release-assets/${APP_ID}_${VERSION}_android_${abi}-${variant}.apk"
          done
          ls -l release-assets/

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          for apk in *.apk; do
            sha256sum "$apk" > "$apk.sha256"
          done

      - name: Write release notes
        run: |
          {
            echo "### Artifacts"
            echo ""
            echo "Commit: \`$GITHUB_SHA\`"
            echo ""
            echo "| File | SHA-256 |"
            echo "| --- | --- |"
            for apk in release-assets/*.apk; do
              name=$(basename "$apk")
              hash=$(sha256sum "$apk" | awk '{print $1}')
              echo "| \`$name\` | \`$hash\` |"
            done
          } > release-notes.md

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APKs (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: apks-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.extract_version.outputs.tag }}
          name: ${{ steps.extract_version.outputs.tag }}
          body_path: release-notes.md
          files: |
            release-assets/*.apk
            release-assets/*.sha256
          fail_on_unmatched_files: true
